name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le lint
        run: npm run lint --if-present

      - name: Vérifier TypeScript
        run: npx tsc --noEmit

      - name: Faire le build
        run: npm run build

      - name: Lancer les tests
        run: npm test --if-present

  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Audit de sécurité (dépendances)
        run: npm run security:audit
